name: Next.js CI

on:
  push:
    branches:
      - admin-staging
  pull_request:
    branches:
      - admin-staging

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name:  Checkout
        uses: actions/checkout@v3

      - name:  Setup Node
        uses: actions/setup-node@v3
        with:
          node-version: "20"

      - name:  Install dependencies
        run: npm install

      - name:  Build
        run: npm run build
