name: Next.js CI

on:
  push:
    branches: ["stagging"]
  pull_request:
    branches: ["stagging"]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - uses: actions/setup-node@v3
        with:
          node-version: "20"

      - run: npm install
      - run: npm run build
